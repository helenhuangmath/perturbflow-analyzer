site_name: PerturbFlow
site_description: Open infrastructure for perturbation biology — analysis, mechanistic interpretation, AI-ready outputs, and benchmarking
repo_url: https://github.com/helenhuangmath/PerturbFlow
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
nav:
  - Home: index.md
  - Vision and Roadmap: vision.md
  - Quick Start: quickstart.md
  - Data Input: data-input.md
  - Analysis Workflow: workflow.md
  - Examples: examples.md
  - AI And Agents: ai-agents.md
  - Outputs: outputs.md
  - Methods: methods.md
  - GitHub Setup: github.md
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
